<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enel Store - Blox Fruits</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(180deg,#0A0A8F,#05054A);
    color:white;
}
header{
    text-align:center;
    padding:20px;
    font-size:30px;
    font-weight:bold;
    color:#00ffff;
}
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}
.card{
    background:#111;
    width:220px;
    margin:12px;
    padding:12px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 0 15px #000;
    transition:0.3s;
}
.card:hover{
    transform:scale(1.05);
}
.card img{
    width:120px;
    height:120px;
    object-fit:contain;
}
button{
    padding:8px;
    margin-top:8px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}
.buy{
    background:#00ffff;
}
.buy:hover{
    background:#00cccc;
}
.admin-btn{
    background:red;
    color:white;
    position:fixed;
    top:10px;
    right:10px;
}
.admin-panel{
    display:none;
    position:fixed;
    top:60px;
    right:10px;
    background:#111;
    padding:15px;
    border-radius:10px;
    max-height:400px;
    overflow:auto;
}
input{
    width:60px;
}
.stock{
    margin-top:5px;
    font-size:14px;
}
</style>
</head>
<body>

<header>⚡ ENEL STORE ⚡</header>

<button class="admin-btn" onclick="loginAdmin()">Modo Dono</button>

<div class="admin-panel" id="adminPanel"></div>

<div class="container" id="products"></div>

<script>

const password = "1234"; // MUDE A SENHA AQUI

const fruits = [
"Leopard","Dragon","Kitsune","Dough","Spirit","Venom","Shadow",
"Control","Mammoth","T-Rex","Blizzard","Gravity","Phoenix",
"Rumble","Portal","Pain","Spider","Love","Buddha","Light",
"Dark","Ice","Flame","Sand","Smoke","Magma","Quake"
];

let stockData = JSON.parse(localStorage.getItem("stock")) || {};

fruits.forEach(f=>{
    if(stockData[f] == null) stockData[f] = 0;
});

function saveStock(){
    localStorage.setItem("stock", JSON.stringify(stockData));
}

function loadProducts(){
    const container = document.getElementById("products");
    container.innerHTML = "";

    fruits.forEach(f=>{
        let imgName = f.toLowerCase().replace(" ", "");
        let imageUrl = `https://robohash.org/${imgName}?set=set4`;

        let card = document.createElement("div");
        card.className="card";

        card.innerHTML=`
        <img src="${imageUrl}">
        <h3>${f}</h3>
        <div class="stock">Estoque: ${stockData[f]}</div>
        <button class="buy" onclick="buy('${f}')">Comprar</button>
        `;

        container.appendChild(card);
    });
}

function buy(fruit){
    if(stockData[fruit] > 0){
        stockData[fruit]--;
        saveStock();
        loadProducts();
        alert("Compra realizada com sucesso!");
    }else{
        alert("Produto esgotado!");
    }
}

function loginAdmin(){
    let pass = prompt("Microondas.123:");
    if(pass === password){
        showAdmin();
    }else{
        alert("Senha incorreta!");
    }
}

function showAdmin(){
    let panel = document.getElementById("adminPanel");
    panel.style.display="block";
    panel.innerHTML="<h3>Painel Dono</h3>";

    fruits.forEach(f=>{
        panel.innerHTML += `
        <div>
        ${f}
        <input type="number" value="${stockData[f]}" 
        onchange="updateStock('${f}', this.value)">
        </div>
        `;
    });
}

function updateStock(fruit,value){
    stockData[fruit] = parseInt(value);
    saveStock();
    loadProducts();
}

loadProducts();

</script>

</body>
</html>
